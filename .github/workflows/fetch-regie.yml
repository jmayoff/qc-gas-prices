name: Fetch Régie XLSX

on:
  schedule:
    - cron: "0 10 * * *" # 6 AM Montreal (EDT)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run fetch script
        run: node scripts/fetch-regie.js

      - name: Commit updated XLSX
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/latest.xlsx
          git commit -m "Update Régie XLSX" || echo "No changes to commit"
          git push

