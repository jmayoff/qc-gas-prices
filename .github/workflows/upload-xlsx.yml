document.getElementById("uploadForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const fileInput = document.getElementById("fileInput");
  const status = document.getElementById("status");

  if (!fileInput.files.length) {
    status.textContent = "Please select a file.";
    return;
  }

  const file = fileInput.files[0];
  status.textContent = "Preparing file...";

  // This is a safer way to convert to Base64 that won't crash the stack
  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });

  try {
    const base64 = await toBase64(file);
    status.textContent = "Uploading…";

    const res = await fetch("https://api.github.com/repos/jmayoff/qc-gas-prices/dispatches", {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer __UPLOAD_TOKEN__",
      },
      body: JSON.stringify({
        event_type: "upload-xlsx",
        client_payload: {
          file: base64,
          filename: file.name
        }
      })
    });

    if (res.ok) {
      status.textContent = "Upload successful!";
    } else {
      const errorData = await res.json();
      console.error("GitHub API Error:", errorData);
      status.textContent = "Upload failed: " + (errorData.message || "Unknown error");
    }
  } catch (err) {
    console.error("Process Error:", err);
    status.textContent = "An error occurred during upload.";
  }
});
