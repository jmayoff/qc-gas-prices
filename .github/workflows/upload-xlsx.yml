name: Upload XLSX

on:
  repository_dispatch:
    types: [upload-xlsx]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decode and save XLSX
        run: |
          echo "${{ github.event.client_payload.file }}" | base64 --decode > data/latest.xlsx

      - name: Commit updated XLSX
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/latest.xlsx
          git commit -m "Update latest.xlsx via upload" || echo "No changes to commit"
          git push
