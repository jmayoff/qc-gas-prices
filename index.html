<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Quebec Gas Prices</title>
</head>
 <body>
  <h1>Quebec Gas Prices</h1>

  <button id="load">Load prices</button>
  <pre id="output"></pre>

<div class="dashboard">
  <h2>Québec Fuel Prices</h2>

  <div class="cards">
    <div class="card"><h3>Québec Avg</h3><p id="avgQC"></p></div>
    <div class="card"><h3>Montréal Avg</h3><p id="avgMTL"></p></div>
    <div class="card"><h3>GMA Avg</h3><p id="avgGMA"></p></div>
  </div>

  <div class="cards">
    <div class="card"><h3>Laval Avg</h3><p id="avgLaval"></p></div>
    <div class="card"><h3>Montérégie Avg</h3><p id="avgMonteregie"></p></div>
  </div>

  <h3>Lowest 5 in Montréal</h3>
  <pre id="lowest5"></pre>

  <h3>Highest 5 in Montréal</h3>
  <pre id="highest5"></pre>
</div>


   
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
