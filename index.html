<header>
    <h1>Québec Gas Prices</h1>
    <div id="lastUpdated">Loading timestamp...</div>
</header>

<main class="dashboard-grid">
    <div class="card">
        <h2>Québec Avg</h2>
        <div class="price" id="avgQC">--</div>
    </div>
    <div class="card">
        <h2>Montréal Avg</h2>
        <div class="price" id="avgMTL">--</div>
    </div>
    <div class="card">
        <h2>Laval Avg</h2>
        <div class="price" id="avgLaval">--</div>
    </div>
    <div class="card">
        <h2>Montérégie Avg</h2>
        <div class="price" id="avgMonteregie">--</div>
    </div>
    <div class="card">
        <h2>GMA Avg</h2>
        <div class="price" id="avgGMA">--</div>
    </div>

    <div class="ranking-section">
        <div class="ranking-card">
            <h3>Lowest 5 Montréal</h3>
            <pre id="lowest5"></pre>
        </div>
        <div class="ranking-card">
            <h3>Highest 5 Montréal</h3>
            <pre id="highest5"></pre>
        </div>
    </div>
</main>

<section class="upload-box">
    <form id="uploadForm">
        <input type="file" id="fileInput" accept=".xlsx">
        <br>
        <button type="submit">Upload New Data</button>
    </form>
    <div id="status"></div>
</section>
