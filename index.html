<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quebec Gas Prices</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <h1>Quebec Gas Prices</h1>
  <p id="lastUpdated" class="timestamp">No data loaded yet</p>

  <!-- File Upload -->
  <form id="uploadForm">
  <input type="file" id="fileInput" accept=".xlsx" required />
  <button type="submit">Upload XLSX</button>
  </form>

<div id="status"></div>


  <!-- Dashboard -->
  <div class="dashboard">
    <h2>Québec Fuel Prices</h2>

    <div class="cards">
      <div class="card"><h3>Québec Avg</h3><p id="avgQC">—</p></div>
      <div class="card"><h3>Montréal Avg</h3><p id="avgMTL">—</p></div>
      <div class="card"><h3>GMA Avg</h3><p id="avgGMA">—</p></div>
    </div>

    <div class="cards">
      <div class="card"><h3>Laval Avg</h3><p id="avgLaval">—</p></div>
      <div class="card"><h3>Montérégie Avg</h3><p id="avgMonteregie">—</p></div>
    </div>

    <h3>Lowest 5 in Montréal</h3>
    <pre id="lowest5"></pre>

    <h3>Highest 5 in Montréal</h3>
    <pre id="highest5"></pre>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
  <script src="upload.js"></script>

</body>
</html>
